version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    commit-message:
      prefix: deps
    labels:
      - dependencies
      - npm
    groups:
      npm-minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:15"
      timezone: "UTC"
    open-pull-requests-limit: 5
    commit-message:
      prefix: ci
    labels:
      - dependencies
      - github-actions
    groups:
      github-actions-minor-and-patch:
        update-types:
          - minor
          - patch
